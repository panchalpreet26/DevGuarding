# Render Blueprint — free web service for DevGuardian API
# https://render.com/docs/blueprint-spec
# Deploy: Dashboard → New → Blueprint → connect this repo

services:
  - type: web
    name: devguardian-api
    runtime: node
    plan: free
    region: oregon
    rootDir: .
    buildCommand: npm install && npm run build -w shared && npm run build -w backend
    startCommand: npm run start -w backend
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      # PORT is injected by Render — do not set it manually
      - key: CLIENT_ORIGIN
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: GITHUB_CALLBACK_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
