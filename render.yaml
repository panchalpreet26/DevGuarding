# Render Blueprint — free web service for DevGuardian API
# https://render.com/docs/blueprint-spec
# Deploy: Dashboard → New → Blueprint → connect this repo

services:
  - type: web
    name: devguardian-api
    runtime: node
    plan: free
    region: oregon
    rootDir: .
    # NODE_ENV=production would skip devDeps; types/tsc live in dependencies,
    # and --include=dev covers shared/workspace tooling on free builds.
    buildCommand: npm install --include=dev && npm run build -w shared && npm run build -w backend
    startCommand: npm run start -w backend
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      # PORT is injected by Render — do not set it manually
      - key: CLIENT_ORIGIN
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: GITHUB_CALLBACK_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-flash-latest
      - key: AI_PROVIDER
        value: gemini
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
